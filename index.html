<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Rive Simulation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background: #222;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            margin-bottom: 20px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            background-color: #4CAF50;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            background-color: #45a049;
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Interaktif Rive Engine</h2>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="btn-trigger">Ganti State (Trigger)</button>
    </div>

    <p class="info">Animasi ini menggunakan State Machine untuk transisi yang mulus.</p>

    <script src="https://unpkg.com/@rive-app/canvas@latest"></script>

    <script>
        // 1. Inisialisasi Instance Rive
        const r = new rive.Rive({
            // Source file animasi (.riv)
            src: "https://cdn.rive.app/animations/vehicles.riv",
            canvas: document.getElementById("canvas"),
            autoplay: true,
            // Nama State Machine yang ada di dalam file Rive
            stateMachines: "bumpy", 
            onLoad: () => {
                // Pastikan gambar tajam di layar Retina/High DPI
                r.resizeDrawingSurfaceToCanvas();

                // 2. Hubungkan Tombol HTML dengan Input di Rive
                const inputs = r.stateMachineInputs("bumpy");
                
                // Cari input spesifik di dalam State Machine (contoh: trigger bernama 'bump')
                const bumpTrigger = inputs.find(i => i.name === "bump");

                document.getElementById("btn-trigger").addEventListener("click", () => {
                    if (bumpTrigger) {
                        bumpTrigger.fire(); // Memicu animasi "bump" di Rive
                        console.log("State Triggered!");
                    }
                });
            },
        });
    </script>
</body>
</html>
